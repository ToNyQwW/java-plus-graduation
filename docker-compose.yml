services:
  stats-db:
    image: postgres:16.1
    container_name: stats-postgres
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: stats
    ports:
      - "5432:5432"

  ewm-db:
    image: postgres:16.1
    container_name: ewm-postgres
    environment:
      POSTGRES_DB: main
      POSTGRES_USER: main
      POSTGRES_PASSWORD: main
    ports:
      - "5433:5432"