server:
  port: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5436/stats
    username: stats
    password: stats
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always