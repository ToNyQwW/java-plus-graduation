server:
  port: 0

grpc:
  server:
    port: -1

spring:
  datasource:
    url: jdbc:postgresql://localhost:5441/category
    username: category
    password: category
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always