spring:
  application:
    name: discovery-server

  cloud:
    loadbalancer:
      service-discovery:
        timeout: 2
      eager-load:
        clients:
          - comment-service
          - event-service
          - gateway-server

server:
  port: 8761

eureka:
  instance:
    hostname: localhost
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/